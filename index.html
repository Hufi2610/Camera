<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>ZXing Barcode Scanner</title>

<script src="https://unpkg.com/@zxing/browser@latest"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    padding:20px;
    background:#f5f5f5;
}

.container{
    max-width:500px;
    margin:auto;
}

.input-wrap{
    display:flex;
    gap:10px;
}

#barcodeInput{
    flex:1;
    height:50px;
    padding:0 15px;
    font-size:18px;
    border:1px solid #ccc;
    border-radius:10px;
    outline:none;
}

#scanBtn{
    width:120px;
    border:none;
    border-radius:10px;
    background:#2196F3;
    color:#fff;
    font-size:16px;
    cursor:pointer;
}

#scanBtn:active{
    transform:scale(.98);
}

/* FULLSCREEN CAMERA */

#scannerModal{
    display:none;
    position:fixed;
    inset:0;
    background:#000;
    z-index:99999;
}

#video{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* CLOSE BUTTON */

#closeBtn{
    position:absolute;
    top:15px;
    right:15px;
    width:50px;
    height:50px;
    border:none;
    border-radius:50%;
    background:rgba(0,0,0,.6);
    color:#fff;
    font-size:30px;
    cursor:pointer;
    z-index:100000;
}

/* SCAN FRAME */

.scan-box{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:320px;
    height:180px;
    border:3px solid #00ff88;
    border-radius:12px;
    pointer-events:none;
}

.scan-box::after{
    content:"";
    position:absolute;
    left:0;
    width:100%;
    height:3px;
    background:#00ff88;
    animation:scan 2s linear infinite;
}

@keyframes scan{
    from{
        top:0;
    }
    to{
        top:calc(100% - 3px);
    }
}

/* MOBILE */

@media(max-width:600px){

    .scan-box{
        width:85vw;
        height:45vw;
        max-width:320px;
        max-height:180px;
    }

    #scanBtn{
        width:100px;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="input-wrap">

        <input
            id="barcodeInput"
            placeholder="Scan Barcode / QR"
            autocomplete="off"
        >

        <button id="scanBtn">
            Scan
        </button>

    </div>

</div>

<div id="scannerModal">

    <button id="closeBtn">
        ×
    </button>

    <video
        id="video"
        playsinline
        muted
    ></video>

</div>

<script>

const input = document.getElementById("barcodeInput");
const modal = document.getElementById("scannerModal");

let codeReader = null;
let currentControls = null;

/* ================= START SCANNER ================= */

async function startScanner(){

    modal.style.display = "block";

    try{

        codeReader =
            new ZXingBrowser.BrowserMultiFormatReader();

        const devices =
            await ZXingBrowser.BrowserCodeReader
            .listVideoInputDevices();

        if(!devices.length){
            throw new Error(
                "Không tìm thấy camera"
            );
        }

        let selectedDevice =
            devices[0].deviceId;

        /* Ưu tiên camera sau */

        for(const device of devices){

            const label =
                (device.label || "")
                .toLowerCase();

            if(
                label.includes("back") ||
                label.includes("rear") ||
                label.includes("environment")
            ){
                selectedDevice =
                    device.deviceId;
                break;
            }
        }

        currentControls =
            await codeReader.decodeFromVideoDevice(
                selectedDevice,
                "video",

                (result, err)=>{

                    if(result){

                        navigator.vibrate?.(100);

                        input.value =
                            result.getText();

                        input.dispatchEvent(
                            new Event("input")
                        );

                        stopScanner();

                        input.focus();
                    }
                }
            );

        setTimeout(
            optimizeCamera,
            1000
        );

    }
    catch(err){

        alert(
            "Không mở được camera\n\n" +
            err.message
        );

        stopScanner();
    }
}

/* ================= CAMERA OPTIMIZATION ================= */

async function optimizeCamera(){

    try{

        const video =
            document.getElementById("video");

        const track =
            video.srcObject
            ?.getVideoTracks()[0];

        if(!track) return;

        const capabilities =
            track.getCapabilities();

        const settings = {};

        if(capabilities.focusMode){

            settings.focusMode =
                "continuous";
        }

        if(capabilities.zoom){

            settings.zoom =
                Math.min(
                    capabilities.zoom.max,
                    2
                );
        }

        await track.applyConstraints({
            advanced:[settings]
        });

    }catch(e){
        console.log(e);
    }
}

/* ================= STOP SCANNER ================= */

function stopScanner(){

    try{

        currentControls?.stop();

        codeReader?.reset();

    }catch(e){}

    modal.style.display = "none";
}

/* ================= EVENTS ================= */

document
.getElementById("scanBtn")
.addEventListener(
    "click",
    startScanner
);

document
.getElementById("closeBtn")
.addEventListener(
    "click",
    stopScanner
);

</script>

</body>
</html>
