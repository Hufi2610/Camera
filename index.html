<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>Barcode Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    padding:20px;
    background:#f5f5f5;
}

.container{
    max-width:500px;
    margin:auto;
}

.input-wrap{
    display:flex;
    gap:10px;
}

#barcodeInput{
    flex:1;
    height:50px;
    padding:0 15px;
    font-size:18px;
    border:1px solid #ccc;
    border-radius:10px;
    outline:none;
}

#scanBtn{
    width:120px;
    border:none;
    border-radius:10px;
    background:#2196F3;
    color:#fff;
    font-size:16px;
    cursor:pointer;
}

#scanBtn:active{
    transform:scale(.98);
}

#scannerModal{
    display:none;
    position:fixed;
    inset:0;
    background:#000;
    z-index:99999;
}

#reader{
    width:100%;
    height:100%;
}

#reader video{
    width:100% !important;
    height:100% !important;
    object-fit:cover !important;
}

#closeBtn{
    position:absolute;
    top:15px;
    right:15px;
    width:50px;
    height:50px;
    border:none;
    border-radius:50%;
    background:rgba(0,0,0,.6);
    color:#fff;
    font-size:30px;
    cursor:pointer;
    z-index:100000;
}
</style>
</head>

<body>

<div class="container">

    <div class="input-wrap">

        <input
            id="barcodeInput"
            placeholder="Scan Barcode / QR"
            autocomplete="off"
        >

        <button id="scanBtn">
            Scan
        </button>

    </div>

</div>

<div id="scannerModal">

    <button id="closeBtn">×</button>

    <div id="reader"></div>

</div>

<script>

let html5QrCode = null;

const input = document.getElementById("barcodeInput");
const modal = document.getElementById("scannerModal");

/* ================= BEST CAMERA ================= */

function getBestCamera(cameras){

    let bestCamera = cameras[0];
    let bestScore = -9999;

    for(const cam of cameras){

        const label =
            (cam.label || "")
            .toLowerCase();

        let score = 0;

        /* camera sau */

        if(label.includes("back")) score += 100;
        if(label.includes("rear")) score += 100;
        if(label.includes("environment")) score += 100;

        /* camera chính */

        if(label.includes("wide")) score += 50;
        if(label.includes("main")) score += 50;
        if(label.includes("standard")) score += 50;

        /* tránh ultra wide */

        if(label.includes("ultra")) score -= 300;
        if(label.includes("0.5")) score -= 300;
        if(label.includes("wide angle")) score -= 300;

        /* tránh camera trước */

        if(label.includes("front")) score -= 1000;
        if(label.includes("user")) score -= 1000;

        if(score > bestScore){

            bestScore = score;
            bestCamera = cam;
        }
    }

    console.log(
        "Selected camera:",
        bestCamera.label
    );

    return bestCamera.id;
}

/* ================= START SCANNER ================= */

async function startScanner(){

    modal.style.display = "block";

    try{

        html5QrCode =
            new Html5Qrcode("reader");

        const cameras =
            await Html5Qrcode.getCameras();

        if(!cameras.length){
            throw new Error(
                "Không tìm thấy camera"
            );
        }

        const cameraId =
            getBestCamera(cameras);

        await html5QrCode.start(

            cameraId,

            {
                fps:20,

                disableFlip:false,

                experimentalFeatures:{
                    useBarCodeDetectorIfSupported:true
                },

                formatsToSupport:[

                    Html5QrcodeSupportedFormats.CODE_128,

                    Html5QrcodeSupportedFormats.EAN_13,

                    Html5QrcodeSupportedFormats.EAN_8,

                    Html5QrcodeSupportedFormats.UPC_A,

                    Html5QrcodeSupportedFormats.UPC_E,

                    Html5QrcodeSupportedFormats.QR_CODE
                ],

                qrbox:(vw,vh)=>{

                    return{
                        width:vw * 0.92,
                        height:260
                    };
                }
            },

            onScanSuccess,

            ()=>{}
        );

    }
    catch(err){

        alert(
            "Không mở được camera\n\n" +
            err.message
        );

        stopScanner();
    }
}

/* ================= SCAN SUCCESS ================= */

function onScanSuccess(decodedText){

    navigator.vibrate?.(100);

    input.value = decodedText;

    input.dispatchEvent(
        new Event("input")
    );

    stopScanner();

    input.focus();
}

/* ================= STOP ================= */

async function stopScanner(){

    try{

        if(html5QrCode){

            await html5QrCode.stop();

            html5QrCode = null;
        }

    }catch(e){
        console.log(e);
    }

    modal.style.display = "none";
}

/* ================= EVENTS ================= */

document
.getElementById("scanBtn")
.addEventListener(
    "click",
    startScanner
);

document
.getElementById("closeBtn")
.addEventListener(
    "click",
    stopScanner
);

</script>

</body>
</html>
